services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env.production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
