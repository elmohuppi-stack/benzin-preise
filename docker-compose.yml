services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT}:3000"
    networks:
      - hetzner-network

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT}:80"
    networks:
      - hetzner-network

networks:
  hetzner-network:
    external: true
